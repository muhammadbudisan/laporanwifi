<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Laporan Pembayaran WiFi</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800;900&family=Archivo+Black&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --sondo-blue-start: #3A7BD5;    
      --sondo-purple-mid: #8F3AF1;    
      --sondo-magenta-end: #D136F2;   
      
      --theme-table-header: #EBF3FF;  
      --theme-month-bg: #2B76F7;      
      --theme-text-dark: #1E293B;
      
      --true-red: #E53E3E;            
      --true-green: #00AA44;          
      --theme-blue-text: #2B76F7;     
      --bg-light: #F8FAFC;            
      --border-color: #CBD5E0;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      font-weight: 900 !important;
    }
    
    body {
      background-color: var(--bg-light);
      padding: 8px 4px; 
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden; /* Mencegah geser kanan pada body */
      width: 100%;
    }

    .container {
      width: 100%;
      max-width: 100%; /* Mengubah 750px menjadi 100% agar mode desktop full penuh layar */
      background: #ffffff;
      padding: 0; 
    }

    .num-font {
      font-family: 'Archivo Black', sans-serif;
      font-weight: 900;
      letter-spacing: normal;
      font-variant-numeric: tabular-nums;
    }

    /* Top Banner Laporan Pembayaran Wifi */
    .banner-title {
      background: linear-gradient(90deg, #2B76F7 0%, #8F3AF1 50%, #B636F2 100%);
      color: white;
      text-align: center;
      padding: 14px 10px;
      font-size: clamp(16px, 4vw, 20px);
      font-weight: 900;
      letter-spacing: 0.5px;
      border-radius: 14px;
      margin-bottom: 6px;
      text-transform: uppercase;
      width: 100%;
    }

    /* Main Balance Box */
    .main-box {
      background: linear-gradient(135deg, #2B76F7 0%, #8F3AF1 50%, #B636F2 100%);
      color: white;
      text-align: center;
      padding: 20px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 10px 25px rgba(143, 58, 241, 0.2);
      width: 100%;
    }

    .wifi-container {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px; 
      color: #00FFCC;
    }

    .wifi-icon {
      width: 22px;
      height: 22px;
      position: relative;
    }

    .icon-blink {
      animation: blink 1.2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .saldo-title {
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      opacity: 0.85;
      margin-bottom: 4px;
      letter-spacing: 0.3px;
    }

    .saldo-amount {
      font-size: clamp(32px, 7vw, 56px);
      font-weight: 900;
      letter-spacing: -0.5px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
      white-space: nowrap;
    }

    /* Summary Grid */
    .grid-summary {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      width: 100%;
    }

    .summary-card {
      flex: 1;
      background: white;
      text-align: center;
      padding: 14px 6px;
      border-radius: 20px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.02);
      border-bottom: 12px solid;
      min-width: 0; 
    }

    .card-bayar { border-bottom-color: var(--true-green); }
    .card-tagihan { border-bottom-color: var(--true-red); }

    .card-title {
      font-size: 11px;
      font-weight: 900;
      color: #718096;
      text-transform: uppercase;
      margin-bottom: 4px;
      opacity: 0.7;
      letter-spacing: 0.5px;
    }

    .card-amount-bayar {
      font-size: clamp(16px, 4.2vw, 32px);
      font-weight: 900;
      color: var(--true-green);
      white-space: nowrap;
    }

    .card-amount-tagihan {
      font-size: clamp(16px, 4.2vw, 32px);
      font-weight: 900;
      color: var(--true-red);
      white-space: nowrap;
    }

    /* Button Input Data Baru */
    .btn-input {
      width: 100%;
      background: linear-gradient(90deg, #2B76F7 0%, #8F3AF1 50%, #B636F2 100%);
      color: white;
      border: none;
      padding: 14px;
      font-size: 15px;
      font-weight: 900;
      border-radius: 15px;
      cursor: pointer;
      text-transform: uppercase;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 12px rgba(143, 58, 241, 0.15);
    }

    /* Table System Styling */
    .table-container {
      width: 100%;
      overflow-x: hidden; 
      background: white;
      border-radius: 20px;
      border: 1px solid var(--border-color);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: center;
      font-size: 13px;
      table-layout: fixed; 
    }

    th {
      background: var(--theme-table-header);
      color: #64748B;
      font-weight: 900;
      padding: 12px 4px;
      border-bottom: 1px solid var(--border-color);
      font-size: clamp(10px, 2.5vw, 12px);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    td {
      padding: 2px 4px;
      color: #111111;
      font-weight: 900;
      border-bottom: 1px solid #F1F5F9;
      font-size: clamp(9px, 2.4vw, 15px); /* Mengecilkan ukuran font batas bawah di mobile */
      white-space: nowrap; /* Mengunci nominal angka agar wajib 1 baris dan tidak pecah ke bawah */
    }

    /* Row Header Bulan */
    .row-month-header {
      background-color: #FAFAFA !important;
      text-align: left;
      font-weight: 900;
      color: var(--theme-month-bg);
      padding: 12px 12px;
      font-size: clamp(12px, 3.2vw, 15px);
      border-bottom: 1px solid var(--border-color);
      white-space: normal; /* Judul bulan tetap normal jika panjang */
    }

    /* Label Rincian Item */
    .txt-rincian {
      color: #94A3B8;
      font-weight: 900;
      text-align: left;
      font-size: clamp(9px, 2.4vw, 13px);
      padding-left: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Row Total */
    .row-total-baris {
      background: linear-gradient(90deg, #2B76F7 0%, #8F3AF1 50%, #B636F2 100%) !important;
    }

    .row-total-baris td {
      background: transparent !important;
      color: white !important;
      font-weight: 900;
      padding: 12px 4px;
      font-size: clamp(9px, 2.4vw, 16px);
      border: none !important;
    }
    
    .row-total-baris td:first-child {
      text-align: left;
      padding-left: 8px;
      letter-spacing: 0.5px;
    }

    /* Kolom Angka Warna Spesifik */
    .col-tagihan { color: var(--true-red); }
    .col-saldo { color: var(--true-green); }
    .col-akm { color: var(--theme-blue-text); }
    
    .row-total-baris .col-saldo { color: white !important; }

    /* Icon Trash SVG */
    .btn-hapus {
      background: none;
      border: none;
      cursor: pointer;
      color: #94A3B8;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s ease;
      padding: 4px;
    }
    .btn-hapus svg { width: 14px; height: 14px; }
    .btn-hapus:hover { color: var(--true-red); }

    .footer {
      text-align: center;
      font-size: 11px;
      font-weight: 900;
      color: #94A3B8;
      margin-top: 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
      width: 100%;
    }

    /* MODAL BASE OVERLAY */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(34, 20, 64, 0.4);
      backdrop-filter: blur(4px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 15px;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 24px;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 20px 25px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .modal-content h3 { margin-top: 0; color: var(--theme-month-bg); font-size: 18px; text-transform: uppercase; margin-bottom: 10px; }
    
    .form-group { text-align: left; margin-bottom: 10px; }
    .form-group label { font-size: 11px; color: #718096; text-transform: uppercase; display: block; margin-bottom: 4px; letter-spacing: 0.5px; }
    .form-group input, .form-group select {
      width: 100%; padding: 10px; border: 2px solid var(--border-color); border-radius: 12px; font-weight: 900; color: #2D3748; transition: border-color 0.2s;
    }

    /* STYLE KHUSUS KEYPAD NUMBER PIN */
    .pin-display {
      font-size: 32px;
      letter-spacing: 15px;
      text-align: center;
      margin: 15px 0;
      color: var(--theme-text-dark);
      min-height: 48px;
    }
    .keypad-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 15px;
    }
    .key-btn {
      background: #F1F5F9;
      color: var(--theme-text-dark);
      border: none;
      padding: 15px 0;
      font-size: 20px;
      font-weight: 900;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .key-btn:active { background: #CBD5E0; }
    .key-btn.clear { background: #fee2e2; color: var(--true-red); }

    /* Lebar kolom tabel */
    th:nth-child(1), td:nth-child(1) { width: 24%; }
    th:nth-child(2), td:nth-child(2) { width: 21%; }
    th:nth-child(3), td:nth-child(3) { width: 19%; }
    th:nth-child(4), td:nth-child(4) { width: 14%; }
    th:nth-child(5), td:nth-child(5) { width: 8%; }
    th:nth-child(6), td:nth-child(6) { width: 14%; }

    @media (max-width: 480px) {
      .num-font { letter-spacing: -0.5px; } /* Merapatkan sedikit spasi font angka pada layar sempit */
      td { padding: 2px 1px; } /* Optimasi padding dalam sel tabel */
      th { padding: 12px 1px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="banner-title">Laporan Pembayaran WiFi</div>

    <div class="main-box">
      <div class="wifi-container">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="wifi-icon icon-blink">
          <path fill-rule="evenodd" d="M.676 6.941A12.964 12.964 0 0 1 10 3c3.657 0 6.963 1.511 9.324 3.941a.75.75 0 0 1-.008 1.053l-.353.354a.75.75 0 0 1-1.069-.008C15.894 6.28 13.097 5 10 5 6.903 5 4.106 6.28 2.106 8.34a.75.75 0 0 1-1.069.008l-.353-.354a.75.75 0 0 1-.008-1.053Zm2.825 2.833A8.976 8.976 0 0 1 10 7a8.976 8.976 0 0 1 6.499 2.774.75.75 0 0 1-.011 1.049l-.354.354a.75.75 0 0 1-1.072-.012A6.978 6.978 0 0 0 10 9c-1.99 0-3.786.83-5.061 2.165a.75.75 0 0 1-1.073.012l-.354-.354a.75.75 0 0 1-.01-1.05Zm2.82 2.84A4.989 4.989 0 0 1 10 11c1.456 0 2.767.623 3.68 1.614a.75.75 0 0 1-.022 1.039l-.354.354a.75.75 0 0 1-1.085-.026A2.99 2.99 0 0 0 10 13c-.88 0-1.67.377-2.22.981a.75.75 0 0 1-1.084.026l-.354-.354a.75.75 0 0 1-.021-1.039Zm3.179 3.178a.75.75 0 1 1 1.06 1.06.75.75 0 0 1-1.06-1.06Z" clip-rule="evenodd"/>
        </svg>
        <span>SYSTEM ONLINE</span>
      </div>
      <div class="saldo-title">Saldo Akumulasi Saat Ini</div>
      <div class="saldo-amount num-font" id="txt-saldo-akm">Rp 78.860</div>
    </div>

    <div class="grid-summary">
      <div class="summary-card card-bayar">
        <div class="card-title">Total Bayar</div>
        <div class="card-amount-bayar num-font" id="txt-total-bayar">Rp 0</div>
      </div>
      <div class="summary-card card-tagihan">
        <div class="card-title">Total Tagihan</div>
        <div class="card-amount-tagihan num-font" id="txt-total-tagihan">Rp 0</div>
      </div>
    </div>

    <button class="btn-input" onclick="bukaProsesInput()">Input Data Baru</button>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th style="text-align: left; padding-left: 8px;">BULAN</th>
            <th class="num-font">PEMBAYARAN</th>
            <th class="num-font">TAGIHAN</th>
            <th class="num-font">SALDO</th>
            <th>OPSI</th>
            <th class="num-font" style="text-align: right; padding-right: 8px;">AKM. SALDO</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr>
            <td colspan="6" style="color: #718096; padding: 25px;">Memuat data laporan WiFi...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="footer">POWERED BY : MBS ID</div>
  </div>

  <div class="modal" id="modal-keypad-pin">
    <div class="modal-content">
      <h3>PIN Keamanan</h3>
      <div class="pin-display" id="pin-dots"></div>
      <div class="keypad-grid">
        <button class="key-btn" onclick="tekanAngka('1')">1</button>
        <button class="key-btn" onclick="tekanAngka('2')">2</button>
        <button class="key-btn" onclick="tekanAngka('3')">3</button>
        <button class="key-btn" onclick="tekanAngka('4')">4</button>
        <button class="key-btn" onclick="tekanAngka('5')">5</button>
        <button class="key-btn" onclick="tekanAngka('6')">6</button>
        <button class="key-btn" onclick="tekanAngka('7')">7</button>
        <button class="key-btn" onclick="tekanAngka('8')">8</button>
        <button class="key-btn" onclick="tekanAngka('9')">9</button>
        <button class="key-btn clear" onclick="hapusAngka()">C</button>
        <button class="key-btn" onclick="tekanAngka('0')">0</button>
        <button class="key-btn" style="background:#edf2f7;" onclick="tutupModal('modal-keypad-pin')">❌</button>
      </div>
    </div>
  </div>

  <div class="modal" id="modal-input">
    <div class="modal-content">
      <h3>Input Transaksi Baru</h3>
      <form id="form-wifi" onsubmit="submitForm(event)" style="margin-top: 15px;">
        <div class="form-group">
          <label>Bulan Periode</label>
          <select id="inp-bulan" required>
            <option value="JANUARI">JANUARI</option>
            <option value="FEBRUARI">FEBRUARI</option>
            <option value="MARET">MARET</option>
            <option value="APRIL">APRIL</option>
            <option value="MEI">MEI</option>
            <option value="JUNI">JUNI</option>
            <option value="JULI">JULI</option>
            <option value="AGUSTUS">AGUSTUS</option>
            <option value="SEPTEMBER">SEPTEMBER</option>
            <option value="OKTOBER">OKTOBER</option>
            <option value="NOVEMBER">NOVEMBER</option>
            <option value="DESEMBER">DESEMBER</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tahun</label>
          <select id="inp-tahun" required></select>
        </div>
        <div class="form-group">
          <label>Pembayaran (Rp)</label>
          <input type="number" id="inp-bayar" value="55000" min="0" required>
        </div>
        <div class="form-group">
          <label>Tagihan (Rp)</label>
          <input type="number" id="inp-tagihan" value="52447" min="0" required>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" onclick="tutupModal('modal-input')">Batal</button>
          <button type="submit" class="btn-submit" id="btn-submit-simpan">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxsHJuEvV6JrrA7yMpRaRz0x035LVzrEGOGeFQUbtzM8nIjJOmTpBhNJyC10jX3klqM-A/exec";
    let nilaiPin = "";

    function formatMataUang(angka) {
      return window.Intl ? new Intl.NumberFormat('id-ID').format(angka) : Number(angka).toLocaleString('id-ID');
    }

    function BuatOpsiTahunSistem() {
      const selectTahun = document.getElementById("inp-tahun");
      if (selectTahun) {
        selectTahun.innerHTML = "";
        for (let tahun = 2026; tahun <= 2035; tahun++) {
          const opsi = document.createElement("option");
          opsi.value = tahun;
          opsi.innerText = tahun;
          if(tahun === 2026) opsi.selected = true;
          selectTahun.appendChild(opsi);
        }
      }
    }

    function loadDashboardData() {
      BuatOpsiTahunSistem();
      fetch(`${WEB_APP_URL}?action=getData`)
        .then(response => response.json())
        .then(res => {
          if(res.error) {
            alert("Gagal memuat data: " + res.error);
            return;
          }
          
          document.getElementById('txt-saldo-akm').innerText = "Rp " + formatMataUang(res.saldoAkumulasi);
          document.getElementById('txt-total-bayar').innerText = "Rp " + formatMataUang(res.totalBayar);
          document.getElementById('txt-total-tagihan').innerText = "Rp " + formatMataUang(res.totalTagihan);
          
          let tbody = document.getElementById('table-body');
          tbody.innerHTML = "";
          
          res.listData.forEach(function(grup) {
            let trBulan = document.createElement('tr');
            trBulan.innerHTML = `<td colspan="6" class="row-month-header">${grup.namaBulan}</td>`;
            tbody.appendChild(trBulan);
            
            grup.data.forEach(function(row) {
              let trData = document.createElement('tr');
              trData.innerHTML = `
                <td class="txt-rincian">• Rincian Item</td>
                <td class="num-font">${formatMataUang(row.bayar)}</td>
                <td class="col-tagihan num-font">${formatMataUang(row.tagihan)}</td>
                <td class="col-saldo num-font">${formatMataUang(row.saldo)}</td>
                <td>
                  <button class="btn-hapus" onclick="prosesHapusData('${row.id}')" title="Hapus Data">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                  </button>
                </td>
                <td class="col-akm num-font" style="text-align: right; padding-right: 8px;">${formatMataUang(row.akmSaldo)}</td>
              `;
              tbody.appendChild(trData);
            });
            
            let trTotal = document.createElement('tr');
            trTotal.className = "row-total-baris";
            trTotal.innerHTML = `
              <td>TOTAL</td>
              <td class="num-font">${formatMataUang(grup.total.bayar)}</td>
              <td class="num-font">${formatMataUang(grup.total.tagihan)}</td>
              <td class="num-font col-saldo">${formatMataUang(grup.total.saldo)}</td>
              <td></td>
              <td class="num-font" style="text-align: right; padding-right: 8px;">${formatMataUang(grup.total.akmSaldo)}</td>
            `;
            tbody.appendChild(trTotal);
          });
        })
        .catch(err => {
          document.getElementById('table-body').innerHTML = `<tr><td colspan="6" style="color: var(--true-red); padding: 25px;">Menghubungkan ke server Google...</td></tr>`;
          setTimeout(loadDashboardData, 2000); 
        });
    }

    window.onload = loadDashboardData;

    function bukaProsesInput() {
      nilaiPin = "";
      updatePinDisplay();
      document.getElementById('modal-keypad-pin').style.display = 'flex';
    }

    function tekanAngka(angka) {
      if (nilaiPin.length < 3) {
        nilaiPin += angka;
        updatePinDisplay();
      }
      if (nilaiPin.length === 3) {
        setTimeout(verifikasiPinOtomatis, 200);
      }
    }

    function hapusAngka() {
      nilaiPin = nilaiPin.slice(0, -1);
      updatePinDisplay();
    }

    function updatePinDisplay() {
      let dots = "";
      for (let i = 0; i < nilaiPin.length; i++) { dots += "•"; }
      document.getElementById('pin-dots').innerText = dots || " ";
    }

    function verifikasiPinOtomatis() {
      if (nilaiPin === "999") {
        tutupModal('modal-keypad-pin');
        document.getElementById('modal-input').style.display = 'flex';
      } else {
        alert("⚠️ PIN Salah! Akses ditolak.");
        nilaiPin = "";
        updatePinDisplay();
      }
    }

    function tutupModal(id) {
      document.getElementById(id).style.display = 'none';
    }

    function submitForm(e) {
      e.preventDefault();
      let bulan = document.getElementById('inp-bulan').value;
      let tahun = document.getElementById('inp-tahun').value;
      let pembayaran = document.getElementById('inp-bayar').value;
      let tagihan = document.getElementById('inp-tagihan').value;
      
      document.getElementById('table-body').innerHTML = `<tr><td colspan="6" style="color: #718096; padding: 20px;">Menyimpan data baru...</td></tr>`;
      tutupModal('modal-input');

      let urlKirim = `${WEB_APP_URL}?action=insert&bulan=${encodeURIComponent(bulan)}&tahun=${encodeURIComponent(tahun)}&pembayaran=${pembayaran}&tagihan=${tagihan}`;
      fetch(urlKirim, { mode: 'no-cors' }).then(() => { setTimeout(loadDashboardData, 1500); });
    }

    function prosesHapusData(idBaris) {
      if(confirm("Apakah Anda yakin ingin menghapus data baris ini?")) {
        document.getElementById('table-body').innerHTML = `<tr><td colspan="6" style="color: #718096; padding: 20px;">Menghapus data...</td></tr>`;
        let urlHapus = `${WEB_APP_URL}?action=delete&id=${idBaris}`;
        fetch(urlHapus, { mode: 'no-cors' }).then(() => { setTimeout(loadDashboardData, 1500); });
      }
    }
  </script>
</body>
</html>
