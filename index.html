<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LAPORAN PEMBAYARAN WIFI</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif; font-weight: bold;
            white-space: nowrap; text-transform: uppercase; }
        html, body { width: 100%; min-height: 100%; margin: 0 !important; padding: 0 !important;
            overflow-x: hidden; background-color: #ffffff; }
        .container { width: 100%; margin: 0 auto; padding: 8px 0; }
        .header-bar { background: linear-gradient(90deg, #2563eb 0%, #9333ea 100%);
            color: white; text-align: center; padding: 12px 0; border-radius: 10px;
            font-weight: 900; font-size: clamp(14px, 3.2vw, 22px); margin: 0 8px 8px;
            animation: terbang 2s ease-in-out infinite alternate; }
        @keyframes terbang { 0% { transform: translateY(0); } 100% { transform: translateY(-4px); } }
        .saldo-card { background: linear-gradient(90deg, #3b82f6 0%, #a855f7 100%);
            border-radius: 10px; padding: 15px 8px; text-align: center; color: white; margin: 0 8px 8px; }
        .system-online { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: clamp(11px, 2.8vw, 16px); margin-bottom: 4px; }
        .system-online span { color: #39FF14; text-shadow: 0 0 8px #39FF14; }
        .radar-wrapper { position: relative; width: 24px; height: 24px; }
        .radar-dot { width: 6px; height: 6px; background: #0F0; border-radius: 50%; box-shadow: 0 0 6px #0F0; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .radar-wave { position: absolute; border: 1px solid #0F0; border-radius: 50%; animation: radar 2s infinite ease-out; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .radar-wave:nth-child(2) { animation-delay: 0.6s; }
        .radar-wave:nth-child(3) { animation-delay: 1.2s; }
        @keyframes radar { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 30px; height: 30px; opacity: 0; } }
        .saldo-label { font-size: clamp(10px, 2.5vw, 15px); opacity: 0.9; margin-bottom: 3px; }
        .saldo-value { font-size: clamp(32px, 10vw, 60px); font-weight: 900; text-transform: none; text-shadow: 0 4px 6px #0002; }
        .total-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 0 8px 8px; }
        .total-box { background: #fff; border-radius: 10px; padding: 12px 4px 6px; text-align: center; box-shadow: 0 1px 3px #0000001a; }
        .total-label { font-size: clamp(9px, 2.2vw, 14px); color: #6b7280; margin-bottom: 3px; }
        .total-bayar { font-size: clamp(16px, 4vw, 24px); font-weight: 900; color: #16a34a; border-bottom: 3px solid #16a34a; padding-bottom: 4px; border-radius: 0 0 6px 6px; text-transform: none; }
        .total-tagihan { font-size: clamp(16px, 4vw, 24px); font-weight: 900; color: #dc2626; border-bottom: 3px solid #dc2626; padding-bottom: 4px; border-radius: 0 0 6px 6px; text-transform: none; }
        .input-bar { background: linear-gradient(90deg, #2563eb 0%, #9333ea 100%);
            color: white; text-align: center; padding: 10px 0; border-radius: 10px;
            font-size: clamp(12px, 3vw, 16px); margin: 0 8px 8px; cursor: pointer;
            touch-action: manipulation; z-index: 10; position: relative; }
        .input-bar:active { opacity: 0.8; transform: scale(0.99); }
        .table-container { border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; margin: 0 8px 4px; }
        .table-header, .table-row, .table-total { display: grid; grid-template-columns: 2.2fr 1.3fr 1.3fr 1.3fr 0.8fr 1.6fr; }
        .table-header { background: #eff6ff; padding: 4px 0; }
        .table-row { background: #fff; padding: 1px 0; border-bottom: 1px solid #f3f4f6; }
        .table-cell { text-align: center; padding: 1px 2px; font-size: clamp(9px, 2.2vw, 13px); display: flex; align-items: center; justify-content: center; line-height: 1.1; }
        .nama-bulan { background: #dbeafe; color: #2563eb; justify-content: flex-start; padding-left: 8px; font-size: clamp(11px, 2.5vw, 15px); font-weight: 900; padding: 3px 8px; }
        .nilai-bayar { color: #16a34a; text-transform: none; }
        .nilai-tagih { color: #dc2626; text-transform: none; }
        .nilai-saldo { color: #16a34a; text-transform: none; }
        .nilai-akm { color: #2563eb; text-transform: none; }
        .table-total { background: linear-gradient(90deg, #2563eb 0%, #9333ea 100%); color: white; padding: 2px 0; font-weight: 900; }
        .icon-hapus { font-size: 10px; cursor: pointer; color: #ff0000; transition: 0.2s; text-shadow: 0 0 2px #ff000099; pointer-events: auto; }
        .icon-hapus:hover { transform: scale(1.5); }

        /* STYLE POP-UP PIN SEPERTI YANG DULU */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; align-items: center; justify-content: center; }
        .modal-box { background: #fff; padding: 25px; border-radius: 12px; width: 280px; text-align: center; box-shadow: 0 0 15px #00000033; }
        .modal-box h4 { margin-bottom: 15px; color: #333; font-size: 16px; }
        .modal-box input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; text-align: center; font-size: 18px; font-weight: bold; }
        .modal-box button { width: 100%; padding: 10px; background: linear-gradient(90deg, #2563eb 0%, #9333ea 100%); color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .modal-box button:active { transform: scale(0.98); }

        .modal-simpan { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #00000099; z-index: 1000; align-items: center; justify-content: center; padding: 8px; overflow-y: auto; }
        .modal-content { background: #fff; border-radius: 16px; padding: 20px; width: calc(100% - 16px); max-width: 340px; text-align: center; box-shadow: 0 4px 12px #00000026; }
        .form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; text-align: left; width: 100%; }
        .form-group label { font-size: clamp(11px, 2.8vw, 14px); color: #334155; }
        .form-group input, .form-group select { padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: clamp(11px, 2.8vw, 14px); outline: none; font-weight: bold; width: 100%; text-transform: none; }
        .btn-simpan-data { background: linear-gradient(90deg, #2563eb 0%, #9333ea 100%); color: white; border: none; padding: 10px 0; border-radius: 8px; font-size: clamp(12px, 3vw, 15px); cursor: pointer; width: 100%; }
        .btn-simpan-data:active { opacity: 0.9; transform: scale(0.98); }
        .footer-text { text-align: center; font-size: clamp(9px, 2vw, 13px); color: #94a3b8; margin-top: 10px; margin-bottom: 15px; letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar">LAPORAN PEMBAYARAN WIFI</div>
        <div class="saldo-card">
            <div class="system-online"><div class="radar-wrapper"><div class="radar-wave"></div><div class="radar-wave"></div><div class="radar-wave"></div><div class="radar-dot"></div></div><span>SYSTEM ONLINE</span></div>
            <div class="saldo-label">SALDO AKUMULASI SAAT INI</div>
            <div class="saldo-value" id="saldoAkumulasi">Rp 0</div>
        </div>
        <div class="total-row">
            <div class="total-box"><div class="total-label">TOTAL BAYAR</div><div class="total-bayar" id="totalBayar">Rp 0</div></div>
            <div class="total-box"><div class="total-label">TOTAL TAGIHAN</div><div class="total-tagihan" id="totalTagihan">Rp 0</div></div>
        </div>
        <div class="input-bar" id="btnBuka">INPUT DATA BARU</div>
        <div class="table-container">
            <div class="table-header">
                <div class="table-cell">BULAN</div><div class="table-cell">PEMBAYARAN</div><div class="table-cell">TAGIHAN</div><div class="table-cell">SALDO</div><div class="table-cell">OPSI</div><div class="table-cell">AKM. SALDO</div>
            </div>
            <div id="isiTabel"></div>
        </div>
        <div class="footer-text">POWERED BY: MBS ID</div>
    </div>

    <!-- POP UP PIN: TAMPILAN SEPERTI DULU -->
    <div id="popupPin" class="modal">
        <div class="modal-box">
            <h4>MASUKKAN PIN KEAMANAN</h4>
            <input type="password" id="inputPin" maxlength="6" placeholder="PIN">
            <button id="btnCekPin">KONFIRMASI</button>
        </div>
    </div>

    <!-- MODAL INPUT DATA -->
    <div class="modal-simpan" id="modalSimpan">
        <div class="modal-content">
            <h3>SIMPAN DATA BARU</h3>
            <div class="form-group">
                <label>BULAN & TAHUN</label>
                <div style="display:flex; gap:6px;">
                    <select id="bulan"><option value="01">Januari</option><option value="02">Februari</option><option value="03">Maret</option><option value="04">April</option><option value="05" selected>Mei</option><option value="06">Juni</option><option value="07">Juli</option><option value="08">Agustus</option><option value="09">September</option><option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option></select>
                    <select id="tahun"><option value="2024">2024</option><option value="2025">2025</option><option value="2026" selected>2026</option><option value="2027">2027</option><option value="2028">2028</option></select>
                </div>
            </div>
            <div class="form-group"><label>PEMBAYARAN (Rp)</label><input type="number" id="pembayaran" value="55000"></div>
            <div class="form-group"><label>TAGIHAN (Rp)</label><input type="number" id="tagihan" value="52447"></div>
            <button class="btn-simpan-data" id="tombolSimpan">SIMPAN</button>
        </div>
    </div>

    <script>
        // 🔒 PIN TERKUNCI DI SINI - TIDAK ADA DI HTML
        const KUNCI_PIN = "999";
        const ALAMAT_API = "https://script.google.com/macros/s/AKfycbxsHJuEvV6JrrA7yMpRaRz0x035LVzrEGOGeFQUbtzM8nIjJOmTpBhNJyC10jX3klqM-A/exec";
        
        // ELEMEN MODAL
        const POPUP_PIN = document.getElementById('popupPin');
        const MODAL_SIMPAN = document.getElementById('modalSimpan');
        let aksiSetelahPin = null; // Menyimpan apa yang mau dilakukan setelah PIN benar

        // URUTAN BULAN
        const URUTAN_BULAN = {
            'JANUARI 2026':1,'FEBRUARI 2026':2,'MARET 2026':3,'APRIL 2026':4,'MEI 2026':5,'JUNI 2026':6,'JULI 2026':7,'AGUSTUS 2026':8,'SEPTEMBER 2026':9,'OKTOBER 2026':10,'NOVEMBER 2026':11,'DESEMBER 2026':12,
            'JANUARI 2025':13,'FEBRUARI 2025':14,'MARET 2025':15,'APRIL 2025':16,'MEI 2025':17,'JUNI 2025':18,'JULI 2025':19,'AGUSTUS 2025':20,'SEPTEMBER 2025':21,'OKTOBER 2025':22,'NOVEMBER 2025':23,'DESEMBER 2025':24,
            'JANUARI 2024':25,'FEBRUARI 2024':26,'MARET 2024':27,'APRIL 2024':28,'MEI 2024':29,'JUNI 2024':30,'JULI 2024':31,'AGUSTUS 2024':32,'SEPTEMBER 2024':33,'OKTOBER 2024':34,'NOVEMBER 2024':35,'DESEMBER 2024':36
        };

        // INISIALISASI
        document.addEventListener('DOMContentLoaded', () => {
            // KLIK INPUT BARU → MUNCULKAN POP UP PIN
            document.getElementById('btnBuka').addEventListener('click', () => {
                aksiSetelahPin = 'bukaForm';
                tampilkanPopupPin();
            });

            // CEK PIN SAAT KLIK KONFIRMASI
            document.getElementById('btnCekPin').addEventListener('click', cekPin);

            // TOMBOL SIMPAN DATA
            document.getElementById('tombolSimpan').addEventListener('click', simpanDataAman);

            ambilDanTampilkanData();
        });

        function tampilkanPopupPin() {
            POPUP_PIN.style.display = 'flex';
            document.getElementById('inputPin').value = '';
            document.getElementById('inputPin').focus();
        }

        function cekPin() {
            const inputUser = document.getElementById('inputPin').value.trim();
            if(inputUser === KUNCI_PIN) {
                POPUP_PIN.style.display = 'none';
                jalankanAksiSetelahPin();
            } else {
                alert("❌ PIN SALAH! COBA LAGI.");
                document.getElementById('inputPin').value = '';
            }
        }

        function jalankanAksiSetelahPin() {
            if(aksiSetelahPin === 'bukaForm') {
                // BUKA FORM INPUT SEPERTI DULU
                MODAL_SIMPAN.style.display = 'flex';
                document.getElementById('bulan').value = '05';
                document.getElementById('tahun').value = '2026';
                document.getElementById('pembayaran').value = '55000';
                document.getElementById('tagihan').value = '52447';
            } 
            else if(aksiSetelahPin?.tipe === 'hapus') {
                // LANGSUNG HAPUS JIKA PIN BENAR
                prosesHapusData(aksiSetelahPin.data);
            }
            aksiSetelahPin = null; // RESET
        }

        async function ambilDanTampilkanData() {
            try {
                const res = await axios.get(ALAMAT_API, { params: { action: 'ambil' } });
                const data = res.data;
                if(data.error) return alert("❌ Kesalahan: " + data.error);

                const daftarPerBulan = {};
                data.data.forEach(item => {
                    const namaBulan = new Date(`${item.tahun}-${item.bulan}-01`).toLocaleDateString('id-ID', { month: 'long', year: 'numeric' }).toUpperCase();
                    if(!daftarPerBulan[namaBulan]) daftarPerBulan[namaBulan] = { bayar:0, tagih:0, saldo:0, rincian:[] };
                    daftarPerBulan[namaBulan].rincian.push(item);
                    daftarPerBulan[namaBulan].bayar += item.pembayaran;
                    daftarPerBulan[namaBulan].tagih += item.tagihan;
                    daftarPerBulan[namaBulan].saldo += item.selisih;
                });

                document.getElementById('saldoAkumulasi').textContent = `Rp ${data.saldoAkhir.toLocaleString('id-ID')}`;
                tampilkanKeTabel(daftarPerBulan);
                hitungTotal(daftarPerBulan);
            } catch(e) { alert("❌ Gagal memuat data: " + e); }
        }

        function tampilkanKeTabel(daftarPerBulan) {
            const wadah = document.getElementById('isiTabel');
            wadah.innerHTML = '';

            Object.keys(daftarPerBulan).sort((a,b) => (URUTAN_BULAN[a]||999)-(URUTAN_BULAN[b]||999)).forEach(bln => {
                wadah.innerHTML += `<div class="table-row"><div class="table-cell nama-bulan">${bln}</div></div>`;
                let saldoAkhirBulan = 0;

                daftarPerBulan[bln].rincian.sort((a,b) => a.waktu-b.waktu).forEach(baris => {
                    saldoAkhirBulan = baris.akumulasi;
                    wadah.innerHTML += `
                        <div class="table-row">
                            <div class="table-cell"></div>
                            <div class="table-cell nilai-bayar">${baris.pembayaran.toLocaleString('id-ID')}</div>
                            <div class="table-cell nilai-tagih">${baris.tagihan.toLocaleString('id-ID')}</div>
                            <div class="table-cell nilai-saldo">${baris.selisih.toLocaleString('id-ID')}</div>
                            <div class="table-cell"><span class="icon-hapus" data-bl="${baris.bulan}" data-th="${baris.tahun}" data-br="${baris.pembayaran}" data-tg="${baris.tagihan}" data-wk="${baris.waktu}">🗑</span></div>
                            <div class="table-cell nilai-akm">${baris.akumulasi.toLocaleString('id-ID')}</div>
                        </div>`;
                });

                wadah.innerHTML += `
                    <div class="table-total">
                        <div class="table-cell">TOTAL</div>
                        <div class="table-cell">${daftarPerBulan[bln].bayar.toLocaleString('id-ID')}</div>
                        <div class="table-cell">${daftarPerBulan[bln].tagih.toLocaleString('id-ID')}</div>
                        <div class="table-cell">${daftarPerBulan[bln].saldo.toLocaleString('id-ID')}</div>
                        <div class="table-cell"></div>
                        <div class="table-cell">${saldoAkhirBulan.toLocaleString('id-ID')}</div>
                    </div>`;
            });

            // KLIK HAPUS → MUNCULKAN POP UP PIN DULU
            document.querySelectorAll('.icon-hapus').forEach(el => {
                el.addEventListener('click', () => {
                    aksiSetelahPin = {
                        tipe: 'hapus',
                        data: {
                            bulan: el.dataset.bl,
                            tahun: el.dataset.th,
                            bayar: parseInt(el.dataset.br),
                            tagih: parseInt(el.dataset.tg),
                            waktu: parseInt(el.dataset.wk)
                        }
                    };
                    tampilkanPopupPin(); // PIN WAJIB SEBELUM HAPUS
                });
            });
        }

        function hitungTotal(daftarPerBulan) {
            let totalBayar = 0, totalTagihan = 0;
            Object.values(daftarPerBulan).forEach(v => { totalBayar += v.bayar; totalTagihan += v.tagih; });
            document.getElementById('totalBayar').textContent = `Rp ${totalBayar.toLocaleString('id-ID')}`;
            document.getElementById('totalTagihan').textContent = `Rp ${totalTagihan.toLocaleString('id-ID')}`;
        }

        async function simpanDataAman() {
            const bulan = document.getElementById('bulan').value;
            const tahun = document.getElementById('tahun').value;
            const bayar = parseInt(document.getElementById('pembayaran').value) || 0;
            const tagih = parseInt(document.getElementById('tagihan').value) || 0;

            if(!bulan || !tahun) return alert("⚠️ Pilih Bulan & Tahun!");

            try {
                const res = await axios.get(ALAMAT_API, { 
                    params: { action: 'simpan', pin: KUNCI_PIN, bulan, tahun, bayar, tagih } 
                });
                if(res.data.sukses) {
                    MODAL_SIMPAN.style.display = 'none';
                    await ambilDanTampilkanData();
                    alert("✅ DATA DISIMPAN");
                } else {
                    alert("❌ " + res.data.pesan);
                }
            } catch(e) { alert("❌ Gagal simpan: " + e); }
        }

        async function prosesHapusData(dt) {
            if(!confirm("⚠️ YAKIN INGIN HAPUS DATA INI?")) return;
            try {
                const res = await axios.get(ALAMAT_API, { 
                    params: { action: 'hapus', pin: KUNCI_PIN, ...dt } 
                });
                if(res.data.sukses) {
                    await ambilDanTampilkanData();
                    alert("✅ DATA DIHAPUS");
                } else {
                    alert("❌ " + res.data.pesan);
                }
            } catch(e) { alert("❌ Gagal hapus: " + e); }
        }

        // TUTUP MODAL JIKA KLIK LUAR
        window.onclick = e => {
            if(e.target === POPUP_PIN) POPUP_PIN.style.display = 'none';
            if(e.target === MODAL_SIMPAN) MODAL_SIMPAN.style.display = 'none';
        };
    </script>
</body>
</html>
