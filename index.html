<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan WiFi Q1 2026 - Modern Rounded</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800;900&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme-blue: #3300FF;      
            --theme-purple: #8f00ff;    
            --true-red: #FF0000;         
            --true-green: #00FF00;       
            --dark-green: #008000;       
            --bg-light: #f5f5f5; 
            --blue-transparent: rgba(51, 0, 255, 0.08);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding: 15px;
            font-weight: 800;
            -webkit-font-smoothing: antialiased;
        }

        .num-font {
            font-family: 'Archivo Black', sans-serif;
            font-weight: 900;
            letter-spacing: normal;
            font-variant-numeric: tabular-nums;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        /* HEADER DENGAN LENGKUNGAN */
        .header-banner {
            background-color: var(--theme-blue);
            color: white;
            text-align: center;
            padding: 25px 15px;
            margin-bottom: 15px;
            border-radius: 20px; /* Membuat sudut lengkung */
        }

        .header-banner h2 {
            font-size: 32px;
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
        }

        /* KARTU SALDO DENGAN LENGKUNGAN */
        .balance-card {
            background-color: var(--theme-purple);
            color: white;
            text-align: center;
            padding: 30px 25px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 25px; /* Lengkungan lebih halus */
            box-shadow: 0 10px 20px rgba(143, 0, 255, 0.2);
        }

        .wifi-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            color: var(--true-green);
        }

        .wifi-icon {
            width: 22px;
            height: 22px;
            position: relative;
        }

        .icon-blink {
            animation: blink 1s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* RADAR EFFECT */
        .wifi-icon::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: currentColor;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: radarDot 1.5s infinite;
        }

        .wifi-icon::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            border: 2px solid currentColor;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: radarWave 1.5s infinite;
        }

        @keyframes radarWave {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
        }

        @keyframes radarDot {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 0, 0.7); }
            100% { box-shadow: 0 0 0 10px rgba(0, 255, 0, 0); }
        }

        .balance-amount {
            font-size: 55px;
            margin: 5px 0;
        }

        .summary-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
